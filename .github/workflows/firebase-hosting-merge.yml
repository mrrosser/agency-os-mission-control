# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      - run: npm ci
      - run: echo "${{ secrets.ENV_LOCAL }}" > .env.local
      - run: npm test
      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Check WIF config
        env:
          GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
        run: |
          echo "DEPLOY_PERFORMED=0" >> $GITHUB_ENV
          if [ -n "$GCP_WIF_PROVIDER" ] && [ -n "$GCP_WIF_SERVICE_ACCOUNT" ]; then
            echo "GCP_AUTH_READY=1" >> $GITHUB_ENV
          else
            echo "GCP_AUTH_READY=0" >> $GITHUB_ENV
          fi
      - name: Authenticate to Google Cloud
        if: ${{ env.GCP_AUTH_READY == '1' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
      - name: Set up gcloud
        if: ${{ env.GCP_AUTH_READY == '1' }}
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
      - name: Firebase deploy (skips if WIF config missing)
        if: ${{ env.GCP_AUTH_READY == '1' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          FIREBASE_HOSTING_SITE: ${{ vars.FIREBASE_HOSTING_SITE || 'leadflow-review' }}
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          NPM_CONFIG_PRODUCTION: "true"
          NODE_ENV: "production"
        run: |
          set -euo pipefail
          CHANNEL_ID="main-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          LOG_FILE="$(mktemp)"
          node scripts/firebase-deploy.mjs hosting:channel:deploy "$CHANNEL_ID" \
            --project "$FIREBASE_PROJECT_ID" \
            --expires 7d \
            --non-interactive 2>&1 | tee "$LOG_FILE"
          PREVIEW_URL="$(grep -Eo 'https://[^[:space:]]+\.web\.app' "$LOG_FILE" | tail -n1 || true)"
          if [ -z "$PREVIEW_URL" ]; then
            echo "Failed to determine Firebase preview URL from channel deploy output."
            exit 1
          fi
          echo "FIREBASE_DEPLOY_CHANNEL=$CHANNEL_ID" >> "$GITHUB_ENV"
          echo "SMOKE_BASE_URL=$PREVIEW_URL" >> "$GITHUB_ENV"
          echo "DEPLOY_PERFORMED=1" >> $GITHUB_ENV
      - name: Ensure SSR backend runtime config (webframeworks)
        if: ${{ env.GCP_AUTH_READY == '1' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          FIREBASE_REGION: ${{ vars.CLOUD_RUN_REGION || 'us-central1' }}
          FIREBASE_SSR_SERVICE: ${{ vars.FIREBASE_SSR_SERVICE || 'ssrleadflowreview' }}
          SOCIAL_DRAFT_WORKER_OIDC_SERVICE_ACCOUNT_EMAILS: ${{ vars.SOCIAL_DRAFT_WORKER_OIDC_SERVICE_ACCOUNT_EMAILS || 'social-drafts-scheduler@leadflow-review.iam.gserviceaccount.com' }}
          SOCIAL_DRAFT_WORKER_OIDC_AUDIENCES: ${{ vars.SOCIAL_DRAFT_WORKER_OIDC_AUDIENCES || '' }}
        run: |
          set -euo pipefail
          SERVICE_URL="$(gcloud run services describe "$FIREBASE_SSR_SERVICE" \
            --project "$FIREBASE_PROJECT_ID" \
            --region "$FIREBASE_REGION" \
            --format='value(status.url)')"
          if [ -z "$SERVICE_URL" ]; then
            echo "Unable to resolve Cloud Run service URL for $FIREBASE_SSR_SERVICE."
            exit 1
          fi
          OIDC_AUDIENCES="$SOCIAL_DRAFT_WORKER_OIDC_AUDIENCES"
          if [ -z "$OIDC_AUDIENCES" ]; then
            OIDC_AUDIENCES="$SERVICE_URL/api/social/drafts/weekly/worker-task,$SERVICE_URL/api/social/drafts/rng-weekly/worker-task"
          fi
          gcloud run services update "$FIREBASE_SSR_SERVICE" \
            --project "$FIREBASE_PROJECT_ID" \
            --region "$FIREBASE_REGION" \
            --memory 512Mi \
            --update-env-vars "^##^SOCIAL_DRAFT_WORKER_OIDC_SERVICE_ACCOUNT_EMAILS=$SOCIAL_DRAFT_WORKER_OIDC_SERVICE_ACCOUNT_EMAILS##SOCIAL_DRAFT_WORKER_OIDC_AUDIENCES=$OIDC_AUDIENCES" \
            --quiet
      - name: Post-deploy production smoke
        if: ${{ env.GCP_AUTH_READY == '1' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          SMOKE_BASE_URL: ${{ env.SMOKE_BASE_URL || vars.PROD_SMOKE_BASE_URL || 'https://leadflow-review.web.app' }}
          SMOKE_TEST_UID: ci-smoke-user-${{ github.run_id }}-${{ github.run_attempt }}
        run: npm run test:postdeploy
      - name: Promote preview channel to live
        if: ${{ success() && env.GCP_AUTH_READY == '1' && env.DEPLOY_PERFORMED == '1' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          FIREBASE_HOSTING_SITE: ${{ vars.FIREBASE_HOSTING_SITE || 'leadflow-review' }}
        run: |
          set -euo pipefail
          node scripts/firebase-deploy.mjs hosting:clone \
            "$FIREBASE_HOSTING_SITE:$FIREBASE_DEPLOY_CHANNEL" \
            "$FIREBASE_HOSTING_SITE:live" \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive
      - name: Cleanup preview channel
        if: ${{ always() && env.GCP_AUTH_READY == '1' && env.DEPLOY_PERFORMED == '1' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          FIREBASE_HOSTING_SITE: ${{ vars.FIREBASE_HOSTING_SITE || 'leadflow-review' }}
        run: |
          set -euo pipefail
          node scripts/firebase-deploy.mjs hosting:channel:delete "$FIREBASE_DEPLOY_CHANNEL" \
            --site "$FIREBASE_HOSTING_SITE" \
            --project "$FIREBASE_PROJECT_ID" \
            --force \
            --non-interactive || true
      - name: Firebase deploy skipped (missing WIF config)
        if: ${{ env.GCP_AUTH_READY != '1' }}
        run: echo "Missing GCP_WIF_PROVIDER/GCP_WIF_SERVICE_ACCOUNT repo vars; deploy skipped."
