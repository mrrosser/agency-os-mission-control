name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      - run: npm ci
      - run: echo "${{ secrets.ENV_LOCAL }}" > .env.local
      - run: npm test
      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Check WIF config
        env:
          GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
        run: |
          echo "DEPLOY_PERFORMED=0" >> $GITHUB_ENV
          if [ -n "$GCP_WIF_PROVIDER" ] && [ -n "$GCP_WIF_SERVICE_ACCOUNT" ]; then
            echo "GCP_AUTH_READY=1" >> $GITHUB_ENV
          else
            echo "GCP_AUTH_READY=0" >> $GITHUB_ENV
          fi
      - name: Authenticate to Google Cloud
        if: ${{ env.GCP_AUTH_READY == '1' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
      - name: Set up gcloud
        if: ${{ env.GCP_AUTH_READY == '1' }}
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
      - name: Firebase deploy (skips if WIF config missing)
        if: ${{ env.GCP_AUTH_READY == '1' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          FIREBASE_HOSTING_SITE: ${{ vars.FIREBASE_HOSTING_SITE || 'leadflow-review' }}
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          NPM_CONFIG_PRODUCTION: "true"
          NODE_ENV: "production"
        run: |
          set -euo pipefail
          CHANNEL_ID="main-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          MAX_ATTEMPTS=4
          ATTEMPT=1
          PREVIEW_URL=""
          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            LOG_FILE="$(mktemp)"
            echo "Firebase deploy attempt $ATTEMPT/$MAX_ATTEMPTS for channel $CHANNEL_ID"
            if node scripts/firebase-deploy.mjs hosting:channel:deploy "$CHANNEL_ID" \
              --project "$FIREBASE_PROJECT_ID" \
              --expires 7d \
              --non-interactive 2>&1 | tee "$LOG_FILE"; then
              PREVIEW_URL="$(grep -Eo 'https://[^[:space:]]+\.(web\.app|firebaseapp\.com)' "$LOG_FILE" | tail -n1 || true)"
              rm -f "$LOG_FILE"
              if [ -n "$PREVIEW_URL" ]; then
                break
              fi
              echo "Deploy succeeded but preview URL was not found in output."
              if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                BACKOFF_SECONDS=$((ATTEMPT * 15))
                echo "Retrying deploy to recover preview URL in ${BACKOFF_SECONDS}s..."
                sleep "$BACKOFF_SECONDS"
                ATTEMPT=$((ATTEMPT + 1))
                continue
              fi
              echo "Failed to determine Firebase preview URL from channel deploy output."
              exit 1
            fi

            if grep -qiE 'unable to queue the operation|http error: 409|status code 409|another operation is in progress|operation is currently in progress' "$LOG_FILE" && [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
              BACKOFF_SECONDS=$((ATTEMPT * 30))
              echo "Firebase operation conflict detected; retrying in ${BACKOFF_SECONDS}s..."
              rm -f "$LOG_FILE"
              sleep "$BACKOFF_SECONDS"
              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            echo "Firebase deploy failed and was not retryable."
            rm -f "$LOG_FILE"
            exit 1
          done

          if [ -z "$PREVIEW_URL" ]; then
            echo "Failed to determine Firebase preview URL from channel deploy output."
            exit 1
          fi
          echo "FIREBASE_DEPLOY_CHANNEL=$CHANNEL_ID" >> "$GITHUB_ENV"
          echo "SMOKE_BASE_URL=$PREVIEW_URL" >> "$GITHUB_ENV"
          echo "DEPLOY_PERFORMED=1" >> $GITHUB_ENV
      - name: Ensure SSR backend runtime config (webframeworks)
        if: ${{ env.GCP_AUTH_READY == '1' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          FIREBASE_REGION: ${{ vars.CLOUD_RUN_REGION || 'us-central1' }}
          FIREBASE_SSR_SERVICE: ${{ vars.FIREBASE_SSR_SERVICE || 'ssrleadflowreview' }}
          LEAD_RUNS_TASK_QUEUE: ${{ vars.LEAD_RUNS_TASK_QUEUE || 'lead-runs-worker' }}
          LEAD_RUNS_TASK_LOCATION: ${{ vars.LEAD_RUNS_TASK_LOCATION || 'us-central1' }}
          LEAD_RUNS_TASK_SERVICE_ACCOUNT: ${{ vars.LEAD_RUNS_TASK_SERVICE_ACCOUNT || 'social-drafts-scheduler@leadflow-review.iam.gserviceaccount.com' }}
          LEAD_SOURCE_BUDGET_MAX_COST_USD: ${{ vars.LEAD_SOURCE_BUDGET_MAX_COST_USD || '2' }}
          LEAD_SOURCE_BUDGET_MAX_PAGES: ${{ vars.LEAD_SOURCE_BUDGET_MAX_PAGES || '4' }}
          LEAD_SOURCE_BUDGET_MAX_RUNTIME_SEC: ${{ vars.LEAD_SOURCE_BUDGET_MAX_RUNTIME_SEC || '50' }}
          SOCIAL_DRAFT_APPROVAL_BASE_URL: ${{ vars.SOCIAL_DRAFT_APPROVAL_BASE_URL || vars.PROD_SMOKE_BASE_URL || 'https://leadflow-review.web.app' }}
          SOCIAL_DRAFT_WORKER_OIDC_SERVICE_ACCOUNT_EMAILS: ${{ vars.SOCIAL_DRAFT_WORKER_OIDC_SERVICE_ACCOUNT_EMAILS || 'social-drafts-scheduler@leadflow-review.iam.gserviceaccount.com' }}
          SOCIAL_DRAFT_WORKER_OIDC_AUDIENCES: ${{ vars.SOCIAL_DRAFT_WORKER_OIDC_AUDIENCES || '' }}
          SMAUTO_MCP_SERVER_URL: ${{ vars.SMAUTO_MCP_SERVER_URL || 'https://social-mcp-hau2jvawpa-uc.a.run.app/mcp' }}
          SMAUTO_MCP_AUTH_MODE: ${{ vars.SMAUTO_MCP_AUTH_MODE || 'id_token' }}
          SMAUTO_MCP_ID_TOKEN_AUDIENCE: ${{ vars.SMAUTO_MCP_ID_TOKEN_AUDIENCE || 'https://social-mcp-hau2jvawpa-uc.a.run.app' }}
          SMAUTO_MCP_SOCIAL_DISPATCH_TOOL: ${{ vars.SMAUTO_MCP_SOCIAL_DISPATCH_TOOL || 'social.dispatch.enqueue' }}
          SMAUTO_MCP_WEBHOOK_FALLBACK_ENABLED: ${{ vars.SMAUTO_MCP_WEBHOOK_FALLBACK_ENABLED || 'false' }}
          SMAUTO_MCP_PROTOCOL_VERSION: ${{ vars.SMAUTO_MCP_PROTOCOL_VERSION || '2025-03-26' }}
          LEADOPS_MCP_SERVER_URL: ${{ vars.LEADOPS_MCP_SERVER_URL || 'https://leadops-engine-gdyt2qma6a-uc.a.run.app/mcp' }}
          LEADOPS_MCP_API_KEY: ${{ secrets.LEADOPS_MCP_API_KEY || '' }}
        run: |
          set -euo pipefail
          SERVICE_URL="$(gcloud run services describe "$FIREBASE_SSR_SERVICE" \
            --project "$FIREBASE_PROJECT_ID" \
            --region "$FIREBASE_REGION" \
            --format='value(status.url)')"
          if [ -z "$SERVICE_URL" ]; then
            echo "Unable to resolve Cloud Run service URL for $FIREBASE_SSR_SERVICE."
            exit 1
          fi
          OIDC_AUDIENCES="$SOCIAL_DRAFT_WORKER_OIDC_AUDIENCES"
          if [ -z "$OIDC_AUDIENCES" ]; then
            OIDC_AUDIENCES="$SERVICE_URL/api/social/drafts/weekly/worker-task,$SERVICE_URL/api/social/drafts/rng-weekly/worker-task"
          fi
          ENV_UPDATES="SOCIAL_DRAFT_WORKER_OIDC_SERVICE_ACCOUNT_EMAILS=$SOCIAL_DRAFT_WORKER_OIDC_SERVICE_ACCOUNT_EMAILS##SOCIAL_DRAFT_WORKER_OIDC_AUDIENCES=$OIDC_AUDIENCES"
          append_env_update() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              ENV_UPDATES="$ENV_UPDATES##$name=$value"
            fi
          }
          append_env_update "LEAD_RUNS_TASK_QUEUE" "$LEAD_RUNS_TASK_QUEUE"
          append_env_update "LEAD_RUNS_TASK_LOCATION" "$LEAD_RUNS_TASK_LOCATION"
          append_env_update "LEAD_RUNS_TASK_SERVICE_ACCOUNT" "$LEAD_RUNS_TASK_SERVICE_ACCOUNT"
          append_env_update "LEAD_SOURCE_BUDGET_MAX_COST_USD" "$LEAD_SOURCE_BUDGET_MAX_COST_USD"
          append_env_update "LEAD_SOURCE_BUDGET_MAX_PAGES" "$LEAD_SOURCE_BUDGET_MAX_PAGES"
          append_env_update "LEAD_SOURCE_BUDGET_MAX_RUNTIME_SEC" "$LEAD_SOURCE_BUDGET_MAX_RUNTIME_SEC"
          append_env_update "SOCIAL_DRAFT_APPROVAL_BASE_URL" "$SOCIAL_DRAFT_APPROVAL_BASE_URL"
          append_env_update "SMAUTO_MCP_SERVER_URL" "$SMAUTO_MCP_SERVER_URL"
          append_env_update "SMAUTO_MCP_AUTH_MODE" "$SMAUTO_MCP_AUTH_MODE"
          append_env_update "SMAUTO_MCP_ID_TOKEN_AUDIENCE" "$SMAUTO_MCP_ID_TOKEN_AUDIENCE"
          append_env_update "SMAUTO_MCP_SOCIAL_DISPATCH_TOOL" "$SMAUTO_MCP_SOCIAL_DISPATCH_TOOL"
          append_env_update "SMAUTO_MCP_WEBHOOK_FALLBACK_ENABLED" "$SMAUTO_MCP_WEBHOOK_FALLBACK_ENABLED"
          append_env_update "SMAUTO_MCP_PROTOCOL_VERSION" "$SMAUTO_MCP_PROTOCOL_VERSION"
          append_env_update "LEADOPS_MCP_SERVER_URL" "$LEADOPS_MCP_SERVER_URL"
          append_env_update "LEADOPS_MCP_API_KEY" "$LEADOPS_MCP_API_KEY"
          gcloud run services update "$FIREBASE_SSR_SERVICE" \
            --project "$FIREBASE_PROJECT_ID" \
            --region "$FIREBASE_REGION" \
            --memory 512Mi \
            --update-env-vars "^##^$ENV_UPDATES" \
            --quiet
      - name: Post-deploy production smoke
        if: ${{ env.GCP_AUTH_READY == '1' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          SMOKE_BASE_URL: ${{ env.SMOKE_BASE_URL || vars.PROD_SMOKE_BASE_URL || 'https://leadflow-review.web.app' }}
          SMOKE_TEST_UID: ci-smoke-user-${{ github.run_id }}-${{ github.run_attempt }}
        run: npm run test:postdeploy
      - name: Promote preview channel to live
        if: ${{ success() && env.GCP_AUTH_READY == '1' && env.DEPLOY_PERFORMED == '1' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          FIREBASE_HOSTING_SITE: ${{ vars.FIREBASE_HOSTING_SITE || 'leadflow-review' }}
        run: |
          set -euo pipefail
          node scripts/firebase-deploy.mjs hosting:clone \
            "$FIREBASE_HOSTING_SITE:$FIREBASE_DEPLOY_CHANNEL" \
            "$FIREBASE_HOSTING_SITE:live" \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive
      - name: Cleanup preview channel
        if: ${{ always() && env.GCP_AUTH_READY == '1' && env.DEPLOY_PERFORMED == '1' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          FIREBASE_HOSTING_SITE: ${{ vars.FIREBASE_HOSTING_SITE || 'leadflow-review' }}
        run: |
          set -euo pipefail
          node scripts/firebase-deploy.mjs hosting:channel:delete "$FIREBASE_DEPLOY_CHANNEL" \
            --site "$FIREBASE_HOSTING_SITE" \
            --project "$FIREBASE_PROJECT_ID" \
            --force \
            --non-interactive || true
      - name: Firebase deploy skipped (missing WIF config)
        if: ${{ env.GCP_AUTH_READY != '1' }}
        run: echo "Missing GCP_WIF_PROVIDER/GCP_WIF_SERVICE_ACCOUNT repo vars; deploy skipped."
