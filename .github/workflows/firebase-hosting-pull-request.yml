# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  id-token: write
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      - run: npm ci
      - run: echo "${{ secrets.ENV_LOCAL }}" > .env.local
      - run: npm test
      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Check WIF config
        env:
          GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$GCP_WIF_PROVIDER" ] && [ -n "$GCP_WIF_SERVICE_ACCOUNT" ]; then
            echo "GCP_AUTH_READY=1" >> $GITHUB_ENV
          else
            echo "GCP_AUTH_READY=0" >> $GITHUB_ENV
          fi
      - name: Authenticate to Google Cloud
        if: ${{ env.GCP_AUTH_READY == '1' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
      - name: Set up gcloud
        if: ${{ env.GCP_AUTH_READY == '1' }}
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
      - name: Firebase preview deploy (skips if WIF config missing)
        if: ${{ env.GCP_AUTH_READY == '1' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          NPM_CONFIG_PRODUCTION: "true"
          NODE_ENV: "production"
        run: |
          set -euo pipefail
          CHANNEL_ID="pr-${{ github.event.number }}"
          node scripts/firebase-deploy.mjs hosting:channel:deploy "$CHANNEL_ID" \
            --project "$FIREBASE_PROJECT_ID" \
            --expires 7d \
            --non-interactive
      - name: Ensure SSR backend memory (webframeworks)
        if: ${{ env.GCP_AUTH_READY == '1' }}
        env:
          FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          FIREBASE_REGION: ${{ vars.CLOUD_RUN_REGION || 'us-central1' }}
          FIREBASE_SSR_SERVICE: ${{ vars.FIREBASE_SSR_SERVICE || 'ssrleadflowreview' }}
        run: |
          set -euo pipefail
          gcloud run services update "$FIREBASE_SSR_SERVICE" \
            --project "$FIREBASE_PROJECT_ID" \
            --region "$FIREBASE_REGION" \
            --memory 512Mi \
            --quiet
      - name: Firebase preview deploy skipped (missing WIF config)
        if: ${{ env.GCP_AUTH_READY != '1' }}
        run: echo "Missing GCP_WIF_PROVIDER/GCP_WIF_SERVICE_ACCOUNT repo vars; preview deploy skipped."
