name: Promptfoo Evals

on:
  pull_request:
    paths:
      - ".github/workflows/promptfoo-evals.yml"
      - ".promptfoo-code-scan.yaml"
      - "promptfooconfig.yaml"
      - "promptfoo/**"
      - "app/api/ai/**"
      - "lib/ai/**"
      - "lib/voice/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/promptfoo-evals.yml"
      - ".promptfoo-code-scan.yaml"
      - "promptfooconfig.yaml"
      - "promptfoo/**"
      - "app/api/ai/**"
      - "lib/ai/**"
      - "lib/voice/**"
      - "scripts/**"
      - "tests/**"
      - "package.json"
  schedule:
    - cron: "55 11 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  promptfoo:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
      PROMPTFOO_CACHE_PATH: .promptfoo/cache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Promptfoo evals
        run: npm run promptfoo:eval

      - name: Run Promptfoo code scan
        if: ${{ github.event_name != 'schedule' && env.PROMPTFOO_API_KEY != '' }}
        run: npm run promptfoo:code-scan

      - name: Promptfoo code scan skipped
        if: ${{ github.event_name != 'schedule' && env.PROMPTFOO_API_KEY == '' }}
        run: echo "PROMPTFOO_API_KEY is not configured; code scan skipped."

      - name: Run Promptfoo redteam
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          if [ -z "$PROMPTFOO_API_KEY" ] && [ -z "$OPENAI_API_KEY" ]; then
            echo "PROMPTFOO_API_KEY or OPENAI_API_KEY is required for scheduled redteam runs; skipping."
            exit 0
          fi
          npm run promptfoo:redteam

      - name: Upload Promptfoo artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-results
          path: .promptfoo/results/
          if-no-files-found: warn
