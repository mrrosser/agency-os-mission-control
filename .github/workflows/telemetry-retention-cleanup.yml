name: Telemetry Retention Cleanup

on:
  schedule:
    # Daily UTC run; GitHub schedules are best-effort.
    - cron: "43 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no deletes)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      event_retention_days:
        description: "Retention in days for telemetry_error_events"
        required: true
        default: "30"
        type: string
      group_retention_days:
        description: "Retention in days for telemetry_error_groups"
        required: true
        default: "180"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Validate WIF config
        env:
          GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$GCP_WIF_PROVIDER" ] || [ -z "$GCP_WIF_SERVICE_ACCOUNT" ]; then
            echo "Missing GCP_WIF_PROVIDER/GCP_WIF_SERVICE_ACCOUNT repo vars." >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}

      - name: Run retention cleanup
        env:
          GCLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          TELEMETRY_EVENT_RETENTION_DAYS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.event_retention_days || '30' }}
          TELEMETRY_GROUP_RETENTION_DAYS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.group_retention_days || '180' }}
          TELEMETRY_CLEANUP_BATCH_SIZE: "200"
          TELEMETRY_CLEANUP_MAX_DELETES_PER_COLLECTION: "5000"
          TELEMETRY_CLEANUP_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
        run: node scripts/telemetry-retention-cleanup.js
