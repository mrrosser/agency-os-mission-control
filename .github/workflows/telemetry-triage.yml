name: Telemetry Triage

on:
  schedule:
    # Hourly (GitHub schedules are best-effort).
    - cron: "17 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Validate WIF config
        env:
          GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$GCP_WIF_PROVIDER" ] || [ -z "$GCP_WIF_SERVICE_ACCOUNT" ]; then
            echo "Missing GCP_WIF_PROVIDER/GCP_WIF_SERVICE_ACCOUNT repo vars." >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}

      - name: Run triage
        env:
          GCLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID || 'leadflow-review' }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TELEMETRY_TRIAGE_MIN_COUNT: "3"
          TELEMETRY_TRIAGE_LIMIT: "10"
          # Phase 3 (optional): add patch suggestions (code pointers + repro checklist) to issue bodies.
          TELEMETRY_TRIAGE_SUGGEST_PATCH: "false"
        run: node scripts/telemetry-triage.js
